<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Formatter - Final Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #e0e0e5; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 400px 1fr; gap: 2rem; }
        .panel { background: #1a1a20; border: 1px solid #2a2a35; border-radius: 12px; padding: 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #5b8ff9, #8b7fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        textarea { width: 100%; min-height: 400px; background: #0f0f15; border: 1px solid #2a2a35; border-radius: 8px; padding: 1rem; color: #e0e0e5; font-family: 'Courier New', monospace; font-size: 0.85rem; resize: vertical; }
        button { width: 100%; padding: 0.875rem; background: linear-gradient(135deg, #5b8ff9, #8b7fff); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 0.75rem; }
        button:hover { opacity: 0.9; }
        button.success { background: linear-gradient(135deg, #5ed9a1, #4bc98f); }
        .templates { display: grid; gap: 0.75rem; margin: 1rem 0; }
        .template { background: #0f0f15; border: 2px solid #2a2a35; border-radius: 8px; padding: 0.75rem; cursor: pointer; }
        .template.active { border-color: #5b8ff9; background: rgba(91, 143, 249, 0.1); }
        .template-name { font-weight: 600; margin-bottom: 0.25rem; }
        .template-desc { font-size: 0.8rem; color: #888; }
        #preview { background: white; padding: 2.5rem; border-radius: 8px; color: #000; font-family: Calibri, Arial, sans-serif; min-height: 600px; }
        .debug { background: #0f0f15; border: 1px solid #2a2a35; border-radius: 8px; padding: 0.75rem; margin-top: 0.75rem; font-family: 'Courier New', monospace; font-size: 0.7rem; color: #5ed9a1; max-height: 250px; overflow-y: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <div class="panel">
                <h1>Resume Formatter</h1>
                <p style="font-size: 0.85rem; color: #888; margin-bottom: 1rem;">Paste resume → Format → Download</p>
                
                <div class="templates">
                    <div class="template active" data-template="classic">
                        <div class="template-name">Classic Blue</div>
                        <div class="template-desc">Traditional ATS-friendly format</div>
                    </div>
                    <div class="template" data-template="modern">
                        <div class="template-name">Modern Green</div>
                        <div class="template-desc">Tech/startup focused</div>
                    </div>
                    <div class="template" data-template="executive">
                        <div class="template-name">Executive</div>
                        <div class="template-desc">Senior leadership</div>
                    </div>
                </div>

                <textarea id="input" placeholder="Paste your resume here..."></textarea>
                <button onclick="format()">Format Resume</button>
                <button class="success" onclick="download()">Download .docx</button>
                <div id="debug" class="debug"></div>
            </div>
        </div>

        <div class="panel">
            <div id="preview" style="color: #999; text-align: center; padding: 4rem;">Preview will appear here</div>
        </div>
    </div>

    <script>
        let parsedResume = null;
        let selectedTemplate = 'classic';

        document.querySelectorAll('.template').forEach(t => {
            t.addEventListener('click', () => {
                document.querySelectorAll('.template').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                selectedTemplate = t.dataset.template;
                if (parsedResume) renderPreview();
            });
        });

        function log(msg) {
            document.getElementById('debug').textContent += msg + '\n';
            console.log(msg);
        }

        function parseResume(text) {
            log('Starting parse...');
            const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l);
            
            const resume = {
                name: '',
                contact: '',
                summary: [],
                experience: [],
                skills: [],
                certifications: [],
                education: []
            };

            let section = null;
            let job = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const upper = line.toUpperCase();
                const next = lines[i + 1] || '';

                if (!resume.name && !line.includes('@') && !line.includes('+1') && !line.includes('·')) {
                    resume.name = line;
                    log(`Name: ${line}`);
                    continue;
                }

                if (!resume.contact && (line.includes('@') || line.includes('+1') || line.includes('·'))) {
                    resume.contact = line;
                    log(`Contact: ${line}`);
                    continue;
                }

                if (upper.includes('PROFESSIONAL SUMMARY') || upper === 'SUMMARY') {
                    section = 'summary';
                    job = null;
                    log('Section: SUMMARY');
                    continue;
                }

                if (upper.includes('PROFESSIONAL EXPERIENCE') || upper === 'EXPERIENCE') {
                    section = 'experience';
                    job = null;
                    log('Section: EXPERIENCE');
                    continue;
                }

                if (upper.includes('TECHNICAL SKILLS') || upper === 'SKILLS') {
                    section = 'skills';
                    job = null;
                    log('Section: SKILLS');
                    continue;
                }

                if (upper.includes('CERTIFICATIONS') || upper.includes('ACHIEVEMENTS')) {
                    section = 'certifications';
                    job = null;
                    log('Section: CERTIFICATIONS');
                    continue;
                }

                if (upper === 'EDUCATION') {
                    section = 'education';
                    job = null;
                    log('Section: EDUCATION');
                    continue;
                }

                if (section === 'summary' && !line.startsWith('•')) {
                    resume.summary.push(line);
                }

                if (section === 'experience') {
                    const isJobTitle = !line.startsWith('•') && !line.includes('·') && !line.includes('|') && 
                                      next && (next.includes('·') || next.includes('|'));
                    
                    if (isJobTitle) {
                        if (job) {
                            resume.experience.push(job);
                            log(`  Job: ${job.title} (${job.bullets.length} bullets)`);
                        }
                        job = { title: line, raw: '', bullets: [] };
                    } else if (job && (line.includes('·') || line.includes('|')) && !line.startsWith('•')) {
                        job.raw = line;
                    } else if (line.startsWith('•') && job) {
                        job.bullets.push(line.substring(1).trim());
                    }
                }

                if (section === 'skills' && line.includes(':')) {
                    const [cat, items] = line.split(':');
                    resume.skills.push({ category: cat.trim(), items: items.trim() });
                }

                if (section === 'certifications') {
                    if (line.startsWith('•')) {
                        resume.certifications.push(line.substring(1).trim());
                    } else if (!upper.includes('CERTIFICATION')) {
                        resume.certifications.push(line);
                    }
                }

                if (section === 'education' && !upper.includes('EDUCATION')) {
                    resume.education.push(line);
                }
            }

            if (job) {
                resume.experience.push(job);
                log(`  Job: ${job.title} (${job.bullets.length} bullets)`);
            }

            log(`\nComplete: ${resume.experience.length} jobs, ${resume.certifications.length} certs`);
            return resume;
        }

        function renderPreview() {
            let html = '<div style="font-family: Calibri;">';
            
            if (parsedResume.name) {
                html += `<div style="text-align: center; font-size: 24pt; font-weight: 700; margin-bottom: 6pt;">${parsedResume.name}</div>`;
            }
            
            if (parsedResume.contact) {
                html += `<div style="text-align: center; font-size: 10pt; color: #666; padding-bottom: 12pt; border-bottom: 3px solid #2563eb; margin-bottom: 12pt;">${parsedResume.contact}</div>`;
            }

            if (parsedResume.summary.length) {
                html += `<div style="font-size: 11pt; font-weight: 700; text-transform: uppercase; margin-top: 12pt; padding-bottom: 4pt; border-bottom: 2px solid #2563eb; margin-bottom: 6pt;">PROFESSIONAL SUMMARY</div>`;
                parsedResume.summary.forEach(s => html += `<div style="font-size: 10pt; margin-bottom: 4pt;">${s}</div>`);
            }

            if (parsedResume.education.length) {
                html += `<div style="font-size: 11pt; font-weight: 700; text-transform: uppercase; margin-top: 12pt; padding-bottom: 4pt; border-bottom: 2px solid #2563eb; margin-bottom: 6pt;">EDUCATION</div>`;
                parsedResume.education.forEach(e => html += `<div style="font-size: 10pt; margin-bottom: 3pt;">${e}</div>`);
            }

            if (parsedResume.skills.length) {
                html += `<div style="font-size: 11pt; font-weight: 700; text-transform: uppercase; margin-top: 12pt; padding-bottom: 4pt; border-bottom: 2px solid #2563eb; margin-bottom: 6pt;">TECHNICAL SKILLS</div>`;
                parsedResume.skills.forEach(s => {
                    html += `<div style="font-size: 10pt; margin-bottom: 4pt;">`;
                    if (s.category) html += `<strong>${s.category}:</strong> `;
                    html += `${s.items}</div>`;
                });
            }

            if (parsedResume.experience.length) {
                html += `<div style="font-size: 11pt; font-weight: 700; text-transform: uppercase; margin-top: 12pt; padding-bottom: 4pt; border-bottom: 2px solid #2563eb; margin-bottom: 6pt;">PROFESSIONAL EXPERIENCE</div>`;
                parsedResume.experience.forEach(job => {
                    html += `<div style="margin-top: 8pt;">`;
                    html += `<div style="font-weight: 700; font-size: 10pt;">${job.title}</div>`;
                    html += `<div style="font-style: italic; font-size: 10pt; color: #666;">${job.raw}</div>`;
                    job.bullets.forEach(b => html += `<div style="margin-left: 12pt; margin-top: 3pt; font-size: 10pt;">• ${b}</div>`);
                    html += `</div>`;
                });
            }

            if (parsedResume.certifications.length) {
                html += `<div style="font-size: 11pt; font-weight: 700; text-transform: uppercase; margin-top: 12pt; padding-bottom: 4pt; border-bottom: 2px solid #2563eb; margin-bottom: 6pt;">CERTIFICATIONS & ACHIEVEMENTS</div>`;
                parsedResume.certifications.forEach(c => html += `<div style="font-size: 10pt; margin-top: 3pt;">• ${c}</div>`);
            }

            html += '</div>';
            document.getElementById('preview').innerHTML = html;
        }

        function format() {
            const text = document.getElementById('input').value;
            if (!text.trim()) return alert('Paste resume text first');
            
            document.getElementById('debug').textContent = '';
            parsedResume = parseResume(text);
            renderPreview();
        }

        async function download() {
            if (!parsedResume) return alert('Format resume first');

            try {
                log('\nSending to server...');
                const response = await fetch('/generate-docx', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resume: parsedResume, template: selectedTemplate })
                });

                if (!response.ok) throw new Error('Server error');

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${parsedResume.name || 'Resume'}.docx`;
                a.click();
                URL.revokeObjectURL(url);
                
                log('Download complete!');
            } catch (error) {
                log('Error: ' + error.message);
                alert('Download failed: ' + error.message);
            }
        }

        document.getElementById('input').addEventListener('input', e => {
            localStorage.setItem('resume-draft', e.target.value);
        });

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('resume-draft');
            if (saved) document.getElementById('input').value = saved;
        });
    </script>
</body>
</html>
